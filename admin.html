<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChatBot Pro — Adminpanel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh}
nav{background:#1a1a1a;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333}
.logo{color:#f0c040;font-weight:800;font-size:1.2rem}
.content{max-width:1100px;margin:0 auto;padding:2rem}
h1{font-size:1.5rem;margin-bottom:2rem;color:#f0c040}
.btn{background:#f0c040;color:#000;border:none;padding:0.7rem 1.5rem;border-radius:6px;cursor:pointer;font-weight:700;font-size:0.9rem}
.btn:hover{background:#fff}
.btn-red{background:#e55;color:#fff}
.btn-red:hover{background:#c33}
.card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.form-group{display:flex;flex-direction:column;gap:0.4rem}
.form-group label{font-size:0.78rem;color:#888;text-transform:uppercase;letter-spacing:0.05em}
.form-group input,.form-group textarea{background:#111;border:1px solid #333;border-radius:6px;padding:0.65rem;color:#f0f0f0;font-size:0.9rem;outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:#f0c040}
.customer-card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:1.2rem;margin-bottom:0.75rem;display:flex;align-items:center;gap:1rem}
.customer-color{width:40px;height:40px;border-radius:50%;flex-shrink:0}
.customer-info{flex:1}
.customer-name{font-weight:700;font-size:1rem}
.customer-url{color:#888;font-size:0.82rem}
.customer-actions{display:flex;gap:0.5rem}
.badge{display:inline-block;padding:0.2rem 0.6rem;border-radius:100px;font-size:0.72rem;font-weight:600}
.badge-active{background:rgba(34,197,94,0.15);color:#22c55e}
.badge-inactive{background:rgba(239,68,68,0.15);color:#ef4444}
.embed-code{background:#111;border:1px solid #333;border-radius:8px;padding:1rem;font-family:monospace;font-size:0.78rem;color:#7dd3fc;white-space:pre-wrap;margin-top:0.75rem}
.tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid #333}
.tab{padding:0.8rem 1.5rem;cursor:pointer;color:#888;border-bottom:2px solid transparent;font-size:0.9rem}
.tab.active{color:#f0c040;border-bottom-color:#f0c040}
.section{display:none}
.section.active{display:block}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:0.75rem;color:#888;font-size:0.78rem;text-transform:uppercase;border-bottom:1px solid #333}
td{padding:0.75rem;border-bottom:1px solid #222;font-size:0.88rem}
#loading{text-align:center;padding:3rem;color:#888}
</style>
</head>
<body>
<nav>
  <div class="logo">ChatBot Pro — Admin</div>
  <div style="color:#888;font-size:0.85rem">Inloggad som admin</div>
</nav>

<div class="content">
  <div class="tabs">
    <div class="tab active" onclick="showTab('kunder')">Kunder</div>
    <div class="tab" onclick="showTab('lagg-till')">Lägg till kund</div>
  </div>

  <!-- KUNDER -->
  <div class="section active" id="tab-kunder">
    <h1>Dina kunder</h1>
    <div id="kund-lista"><div id="loading">Laddar kunder...</div></div>
  </div>

  <!-- LÄGG TILL -->
  <div class="section" id="tab-lagg-till">
    <h1>Lägg till ny kund</h1>
    <div class="card">
      <div class="form-grid">
        <div class="form-group">
          <label>Företagsnamn</label>
          <input id="f-name" placeholder="Alviks Bygg AB"/>
        </div>
        <div class="form-group">
          <label>Hemsida URL</label>
          <input id="f-url" placeholder="https://www.foretagsnamn.se"/>
        </div>
        <div class="form-group">
          <label>Temafärg (hex)</label>
          <input id="f-color" placeholder="#f0c040" type="color" value="#f0c040"/>
        </div>
        <div class="form-group">
          <label>Kontakt email</label>
          <input id="f-email" placeholder="info@foretagsnamn.se"/>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:1rem">
        <label>Välkomstmeddelande</label>
        <input id="f-greeting" placeholder="Hej! Välkommen till Företaget. Hur kan vi hjälpa dig?"/>
      </div>
      <button class="btn" onclick="laggTillKund()">Lägg till kund</button>
      <div id="success-msg" style="display:none;margin-top:1rem;color:#22c55e;font-size:0.9rem">✓ Kunden har lagts till!</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://lqiyxkgizgnxpoqovqam.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxaXl4a2dpemdueHBvcW92cWFtIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTgwNTYzNSwiZXhwIjoyMDk1MzgxNjM1fQ.2kFYwKFVX8YX7ZfkNoiy5xp1c00PZEDaZQjZjUsPKHA";

function showTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");
  if(tab === "kunder") laddaKunder();
}

async function supabase(method, path, body) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": method === "POST" ? "return=representation" : ""
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok) throw new Error(await res.text());
  return method === "DELETE" ? null : res.json();
}

function getEmbedCode(customer) {
  return `<script src="https://chatbot-saas.vercel.app/chat.js?id=${customer.id}"><\/script>`;
}

async function laddaKunder() {
  try {
    const kunder = await supabase("GET", "customers?select=*&order=created_at.desc");
    const lista = document.getElementById("kund-lista");
    if(!kunder || kunder.length === 0) {
      lista.innerHTML = '<div style="color:#888;padding:2rem;text-align:center">Inga kunder än. Lägg till din första kund!</div>';
      return;
    }
    lista.innerHTML = kunder.map(k => `
      <div class="customer-card">
        <div class="customer-color" style="background:${k.primary_color}"></div>
        <div class="customer-info">
          <div class="customer-name">${k.name} <span class="badge ${k.active ? 'badge-active' : 'badge-inactive'}">${k.active ? 'Aktiv' : 'Inaktiv'}</span></div>
          <div class="customer-url">${k.website_url || '-'}</div>
          <div class="embed-code">${getEmbedCode(k)}</div>
        </div>
        <div class="customer-actions">
          <button class="btn btn-red" onclick="raderaKund('${k.id}')">Radera</button>
        </div>
      </div>
    `).join("");
  } catch(e) {
    document.getElementById("kund-lista").innerHTML = '<div style="color:#e55;padding:2rem">Fel: ' + e.message + '</div>';
  }
}

async function laggTillKund() {
  const name = document.getElementById("f-name").value.trim();
  const url = document.getElementById("f-url").value.trim();
  const color = document.getElementById("f-color").value;
  const email = document.getElementById("f-email").value.trim();
  const greeting = document.getElementById("f-greeting").value.trim();

  if(!name) { alert("Fyll i företagsnamn!"); return; }

  try {
    await supabase("POST", "customers", {
      name, website_url: url, primary_color: color,
      contact_email: email,
      greeting: greeting || "Hej! Välkommen till " + name + ". Hur kan vi hjälpa dig?",
      active: true
    });
    document.getElementById("success-msg").style.display = "block";
    setTimeout(() => {
      document.getElementById("success-msg").style.display = "none";
      document.querySelectorAll(".tab")[0].click();
    }, 1500);
  } catch(e) {
    alert("Fel: " + e.message);
  }
}

async function raderaKund(id) {
  if(!confirm("Är du säker på att du vill radera denna kund?")) return;
  await supabase("DELETE", "customers?id=eq."+id);
  laddaKunder();
}

laddaKunder();
</script>
</body>
</html>
