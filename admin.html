<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChatBot Pro — Adminpanel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh}
nav{background:#1a1a1a;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333}
.logo{color:#f0c040;font-weight:800;font-size:1.2rem}
.content{max-width:1100px;margin:0 auto;padding:2rem}
h1{font-size:1.5rem;margin-bottom:2rem;color:#f0c040}
h2{font-size:1.1rem;margin-bottom:1rem;color:#f0c040}
.btn{background:#f0c040;color:#000;border:none;padding:0.7rem 1.5rem;border-radius:6px;cursor:pointer;font-weight:700;font-size:0.9rem}
.btn:hover{background:#fff}
.btn-red{background:#e55;color:#fff}
.btn-red:hover{background:#c33}
.btn-gray{background:#333;color:#fff}
.btn-gray:hover{background:#444}
.card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.form-group{display:flex;flex-direction:column;gap:0.4rem}
.form-group label{font-size:0.78rem;color:#888;text-transform:uppercase;letter-spacing:0.05em}
.form-group input,.form-group textarea,.form-group select{background:#111;border:1px solid #333;border-radius:6px;padding:0.65rem;color:#f0f0f0;font-size:0.9rem;outline:none;font-family:sans-serif}
.form-group input:focus,.form-group textarea:focus{border-color:#f0c040}
.form-group textarea{min-height:120px;resize:vertical}
.customer-card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:1.2rem;margin-bottom:0.75rem}
.customer-top{display:flex;align-items:center;gap:1rem}
.customer-color{width:40px;height:40px;border-radius:50%;flex-shrink:0}
.customer-info{flex:1}
.customer-name{font-weight:700;font-size:1rem}
.customer-url{color:#888;font-size:0.82rem}
.customer-actions{display:flex;gap:0.5rem;flex-wrap:wrap}
.badge{display:inline-block;padding:0.2rem 0.6rem;border-radius:100px;font-size:0.72rem;font-weight:600}
.badge-active{background:rgba(34,197,94,0.15);color:#22c55e}
.embed-code{background:#111;border:1px solid #333;border-radius:8px;padding:1rem;font-family:monospace;font-size:0.78rem;color:#7dd3fc;white-space:pre-wrap;margin-top:0.75rem;word-break:break-all}
.tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid #333}
.tab{padding:0.8rem 1.5rem;cursor:pointer;color:#888;border-bottom:2px solid transparent;font-size:0.9rem}
.tab.active{color:#f0c040;border-bottom-color:#f0c040}
.section{display:none}
.section.active{display:block}
#loading{text-align:center;padding:3rem;color:#888}
.edit-panel{display:none;margin-top:1rem;border-top:1px solid #333;padding-top:1rem}
.edit-panel.open{display:block}
.success{color:#22c55e;font-size:0.9rem;margin-top:0.5rem}
</style>
</head>
<body>
<nav>
  <div class="logo">ChatBot Pro — Admin</div>
  <div style="color:#888;font-size:0.85rem">Inloggad som admin</div>
</nav>

<div class="content">
  <div class="tabs">
    <div class="tab active" onclick="showTab('kunder', this)">Kunder</div>
    <div class="tab" onclick="showTab('lagg-till', this)">Lägg till kund</div>
  </div>

  <div class="section active" id="tab-kunder">
    <h1>Dina kunder</h1>
    <div id="kund-lista"><div id="loading">Laddar kunder...</div></div>
  </div>

  <div class="section" id="tab-lagg-till">
    <h1>Lägg till ny kund</h1>
    <div class="card">
      <div class="form-grid">
        <div class="form-group">
          <label>Företagsnamn</label>
          <input id="f-name" placeholder="Alviks Bygg AB"/>
        </div>
        <div class="form-group">
          <label>Hemsida URL</label>
          <input id="f-url" placeholder="https://www.foretagsnamn.se"/>
        </div>
        <div class="form-group">
          <label>Temafärg</label>
          <input id="f-color" type="color" value="#f0c040"/>
        </div>
        <div class="form-group">
          <label>Kontakt email</label>
          <input id="f-email" placeholder="info@foretagsnamn.se"/>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:1rem">
        <label>Välkomstmeddelande</label>
        <input id="f-greeting" placeholder="Hej! Välkommen till Företaget. Hur kan vi hjälpa dig?"/>
      </div>
      <div class="form-group" style="margin-bottom:1rem">
        <label>Logga URL (valfritt)</label>
        <input id="f-logo" placeholder="https://foretagsnamn.se/logga.png"/>
      </div>
      <div class="form-grid" style="margin-bottom:1rem">
        <div class="form-group">
          <label>Logga bakgrundsfärg</label>
          <input id="f-logo-bg" type="color" value="#000000"/>
        </div>
        <div class="form-group">
          <label>Logga form</label>
          <select id="f-logo-shape">
            <option value="50%">Rund</option>
            <option value="8px">Rundad fyrkant</option>
            <option value="0">Fyrkantig</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:1.5rem">
        <label>Extra info till chatboten</label>
        <textarea id="f-info" placeholder="Öppettider: Mån-Fre 08:00-17:00&#10;Telefon: 070-000 00 00&#10;Tjänster: ..."></textarea>
      </div>
      <button class="btn" onclick="laggTillKund()">Lägg till kund</button>
      <div id="success-msg" class="success" style="display:none">✓ Kunden har lagts till!</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://lqiyxkgizgnxpoqovqam.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxaXl4a2dpemdueHBvcW92cWFtIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTgwNTYzNSwiZXhwIjoyMDk1MzgxNjM1fQ.2kFYwKFVX8YX7ZfkNoiy5xp1c00PZEDaZQjZjUsPKHA";

function showTab(tab, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");
  if(tab === "kunder") laddaKunder();
}

async function supabaseReq(method, path, body) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": method === "POST" ? "return=representation" : method === "PATCH" ? "return=representation" : ""
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if(!res.ok) throw new Error(await res.text());
  if(method === "DELETE") return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function genScript(k) {
  const color = (k.primary_color || "#f0c040").replace(/"/g,"");
  const name = (k.name || "Chatbot").replace(/\\/g,"").replace(/"/g,"'");
  const greeting = (k.greeting || "Hej! Hur kan vi hjälpa dig?").replace(/\\/g,"").replace(/"/g,"'");
  const id = k.id;
  const base = "https://chatbot-saas-topaz.vercel.app";
  const initials = name.slice(0,2).toUpperCase();
  const logoHtml = k.logo_url
    ? `<img src='${k.logo_url}' style='width:32px;height:32px;object-fit:contain;border-radius:${k.logo_shape||"50%"};background:${k.logo_bg||"#000"};padding:2px;'>`
    : initials;

  return `<script>
(function(){
var color="${color}",name="${name}",greeting="${greeting}",id="${id}";
var base="${base}";
var s=document.createElement("style");
s.textContent="#cbp-btn{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:"+color+";border:none;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:9998;color:white}#cbp-win{position:fixed;bottom:96px;right:24px;width:340px;max-height:520px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.2);display:flex;flex-direction:column;overflow:hidden;z-index:9999;font-family:sans-serif}#cbp-win.hidden{display:none}#cbp-hdr{padding:1rem;display:flex;align-items:center;gap:.7rem;background:"+color+"}#cbp-logo{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden}#cbp-hdr-txt{flex:1}#cbp-hdr-txt strong{display:block;color:#fff;font-size:.9rem}#cbp-hdr-txt span{color:rgba(255,255,255,0.85);font-size:.72rem}#cbp-close{background:rgba(255,255,255,0.2);border:none;border-radius:50%;width:28px;height:28px;color:#fff;cursor:pointer;margin-right:4px}#cbp-clear{background:rgba(255,255,255,0.2);border:none;border-radius:50%;width:28px;height:28px;color:#fff;cursor:pointer;font-size:.7rem}#cbp-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.7rem;background:#f8f8f8}.cbp-bot{max-width:85%;padding:.65rem .9rem;font-size:.84rem;line-height:1.5;background:#fff;border-radius:14px 14px 14px 4px;align-self:flex-start;color:#1a1a1a;box-shadow:0 1px 4px rgba(0,0,0,0.08)}.cbp-user{max-width:85%;padding:.65rem .9rem;font-size:.84rem;line-height:1.5;border-radius:14px 14px 4px 14px;align-self:flex-end;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.08);background:"+color+"}.cbp-qbtns{display:flex;flex-direction:column;gap:.5rem}.cbp-qbtn{display:flex;align-items:center;justify-content:space-between;background:#fff5f0;border:1px solid #ffd5c0;border-radius:10px;padding:.7rem 1rem;cursor:pointer;font-size:.87rem;color:#1a1a1a;width:100%;text-align:left}.cbp-typing{display:none;gap:5px;padding:.4rem 0;align-self:flex-start}.cbp-typing span{width:8px;height:8px;border-radius:50%;background:#9e9e9e;opacity:.7;animation:cbp-b 1.1s infinite}.cbp-typing span:nth-child(2){animation-delay:.18s}.cbp-typing span:nth-child(3){animation-delay:.36s}@keyframes cbp-b{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}#cbp-inp-area{padding:.75rem;border-top:1px solid #eee;display:flex;gap:.5rem;background:#fff}#cbp-inp{flex:1;border:1px solid #ddd;border-radius:20px;padding:.55rem 1rem;font-size:.85rem;outline:none;background:#f5f5f5;color:#333}#cbp-send{width:38px;height:38px;border-radius:50%;border:none;color:#fff;cursor:pointer;flex-shrink:0;font-size:1rem;background:"+color+"}";
document.head.appendChild(s);
var div=document.createElement("div");
div.innerHTML='<button id="cbp-btn" onclick="cbpToggle()">💬</button><div id="cbp-win" class="hidden"><div id="cbp-hdr"><div id="cbp-logo">${logoHtml}</div><div id="cbp-hdr-txt"><strong>'+name+'</strong><span>Hur kan vi hjälpa dig?</span></div><button id="cbp-close" onclick="cbpToggle()">×</button><button id="cbp-clear" onclick="cbpRensa()" title="Rensa chatt">🗑️</button></div><div id="cbp-msgs"><div class="cbp-bot">'+greeting+'</div><div class="cbp-qbtns"><button class="cbp-qbtn" onclick="cbpSend(null,this.textContent.slice(2))">🔨 Tjänster ›</button><button class="cbp-qbtn" onclick="cbpSend(null,this.textContent.slice(2))">📞 Kontakt ›</button><button class="cbp-qbtn" onclick="cbpSend(null,this.textContent.slice(2))">📍 Orter ›</button><button class="cbp-qbtn" onclick="cbpOffert()" style="background:'+color+';color:#fff;border:none;">📋 Begär offert</button></div><div class="cbp-typing" id="cbp-typing"><span></span><span></span><span></span></div></div><div id="cbp-inp-area"><input id="cbp-inp" placeholder="Skriv din fråga..." onkeydown="if(event.key==\\'Enter\\')cbpSend()"/><button id="cbp-send" onclick="cbpSend()">➤</button></div></div>';
document.body.appendChild(div);
var msgs=[],loading=false,bedomning=false;
window.cbpToggle=function(){
  var w=document.getElementById("cbp-win"),b=document.getElementById("cbp-btn");
  if(!w.classList.contains("hidden")&&msgs.length>0&&!bedomning){bedomning=true;cbpVisaBedomning();}
  w.classList.toggle("hidden");
  b.textContent=w.classList.contains("hidden")?"💬":"×";
};
window.cbpRensa=function(){
  var m=document.getElementById("cbp-msgs");
  m.innerHTML='<div class="cbp-bot">'+greeting+'</div><div class="cbp-qbtns"><button class="cbp-qbtn" onclick="cbpSend(null,this.textContent.slice(2))">🔨 Tjänster ›</button><button class="cbp-qbtn" onclick="cbpSend(null,this.textContent.slice(2))">📞 Kontakt ›</button><button class="cbp-qbtn" onclick="cbpSend(null,this.textContent.slice(2))">📍 Orter ›</button><button class="cbp-qbtn" onclick="cbpOffert()" style="background:'+color+';color:#fff;border:none;">📋 Begär offert</button></div><div class="cbp-typing" id="cbp-typing"><span></span><span></span><span></span></div>';
  msgs=[];bedomning=false;
};
function cbpAddMsg(t,r){
  var qb=document.querySelector(".cbp-qbtns");if(qb)qb.remove();
  var m=document.getElementById("cbp-msgs"),d=document.createElement("div");
  d.className=r==="user"?"cbp-user":"cbp-bot";d.textContent=t;
  m.insertBefore(d,document.getElementById("cbp-typing"));
  m.scrollTop=m.scrollHeight;
}
window.cbpOffert=function(){
  var qb=document.querySelector(".cbp-qbtns");if(qb)qb.remove();
  var d=document.createElement("div");d.className="cbp-bot";d.style.width="100%";
  d.innerHTML='<strong>Begär offert</strong><br><br><input id="cbp-of-namn" placeholder="Namn" style="width:100%;margin-bottom:6px;padding:6px;border:1px solid #ddd;border-radius:6px;"><br><input id="cbp-of-tel" placeholder="Telefon" style="width:100%;margin-bottom:6px;padding:6px;border:1px solid #ddd;border-radius:6px;"><br><input id="cbp-of-mail" placeholder="E-post" style="width:100%;margin-bottom:6px;padding:6px;border:1px solid #ddd;border-radius:6px;"><br><textarea id="cbp-of-msg" placeholder="Beskriv ditt projekt..." style="width:100%;margin-bottom:6px;padding:6px;border:1px solid #ddd;border-radius:6px;height:80px;"></textarea><br><button onclick="cbpSkickaOffert()" style="background:'+color+';color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;width:100%;">Skicka offertförfrågan</button>';
  var m=document.getElementById("cbp-msgs");
  m.insertBefore(d,document.getElementById("cbp-typing"));
  m.scrollTop=m.scrollHeight;
};
window.cbpSkickaOffert=function(){
  var namn=document.getElementById("cbp-of-namn").value;
  var tel=document.getElementById("cbp-of-tel").value;
  var mail=document.getElementById("cbp-of-mail").value;
  var msg=document.getElementById("cbp-of-msg").value;
  if(!namn||!tel||!msg){cbpAddMsg("Fyll i namn, telefon och projektbeskrivning!","bot");return;}
  cbpSend(null,"Offertförfrågan från "+namn+" ("+tel+", "+mail+"): "+msg);
};
function cbpVisaBedomning(){
  var d=document.createElement("div");d.className="cbp-bot";d.style.width="100%";
  d.innerHTML='<strong>Hur nöjd var du med hjälpen?</strong><br><br><div style="font-size:1.8rem;cursor:pointer;"><span onclick="cbpBedomning(1)">⭐</span><span onclick="cbpBedomning(2)">⭐</span><span onclick="cbpBedomning(3)">⭐</span><span onclick="cbpBedomning(4)">⭐</span><span onclick="cbpBedomning(5)">⭐</span></div>';
  var m=document.getElementById("cbp-msgs");
  m.insertBefore(d,document.getElementById("cbp-typing"));
  m.scrollTop=m.scrollHeight;
}
window.cbpBedomning=function(n){cbpAddMsg("Tack för din bedömning: "+"★".repeat(n)+"☆".repeat(5-n),"bot");};
window.cbpSend=async function(e,text){
  var inp=document.getElementById("cbp-inp");
  var msg=text||inp.value.trim();if(!msg||loading)return;
  inp.value="";loading=true;
  document.getElementById("cbp-send").disabled=true;
  cbpAddMsg(msg,"user");msgs.push({role:"user",content:msg});
  if(msgs.length>20)msgs=msgs.slice(-20);
  document.getElementById("cbp-typing").style.display="flex";
  var timeout=setTimeout(function(){
    document.getElementById("cbp-typing").style.display="none";
    cbpAddMsg("Det tog för lång tid att svara. Försök igen!","bot");
    loading=false;document.getElementById("cbp-send").disabled=false;
  },10000);
  try{
    var r=await fetch(base+"/api/chat?id="+id,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:msgs})});
    var data=await r.json();
    clearTimeout(timeout);
    document.getElementById("cbp-typing").style.display="none";
    var reply=data.content&&data.content[0]?data.content[0].text:"Kunde inte svara.";
    cbpAddMsg(reply,"bot");msgs.push({role:"assistant",content:reply});
  }catch(e){
    clearTimeout(timeout);
    document.getElementById("cbp-typing").style.display="none";
    cbpAddMsg("Något gick fel. Försök igen!","bot");
  }
  loading=false;document.getElementById("cbp-send").disabled=false;
};
})();
<\/script>`;
}

function kopiera(id, name, color, greeting, logo_url, logo_bg, logo_shape) {
  var k = {id, name, primary_color:color, greeting, logo_url, logo_bg, logo_shape};
  var kod = genScript(k);
  navigator.clipboard.writeText(kod);
  alert("Inbäddningskod kopierad!");
}

function toggleEdit(id) {
  var panel = document.getElementById("edit-"+id);
  panel.classList.toggle("open");
}

async function sparaKund(id) {
  var namn = document.getElementById("edit-name-"+id).value;
  var url = document.getElementById("edit-url-"+id).value;
  var color = document.getElementById("edit-color-"+id).value;
  var email = document.getElementById("edit-email-"+id).value;
  var greeting = document.getElementById("edit-greeting-"+id).value;
  var extraInfo = document.getElementById("edit-info-"+id).value;
  var logoUrl = document.getElementById("edit-logo-"+id).value;
  var logoBg = document.getElementById("edit-logo-bg-"+id).value;
  var logoShape = document.getElementById("edit-logo-shape-"+id).value;
  try {
    await supabaseReq("PATCH", "customers?id=eq."+id, {
      name:namn, website_url:url, primary_color:color, contact_email:email,
      greeting:greeting, extra_info:extraInfo, logo_url:logoUrl, logo_bg:logoBg, logo_shape:logoShape
    });
    document.getElementById("save-msg-"+id).style.display = "block";
    setTimeout(() => { document.getElementById("save-msg-"+id).style.display = "none"; }, 2000);
  } catch(e) { alert("Fel: " + e.message); }
}

async function laddaKunder() {
  try {
    const kunder = await supabaseReq("GET", "customers?select=*&order=created_at.desc");
    const lista = document.getElementById("kund-lista");
    if(!kunder || kunder.length === 0) {
      lista.innerHTML = '<div style="color:#888;padding:2rem;text-align:center">Inga kunder än!</div>';
      return;
    }
    lista.innerHTML = kunder.map(k => `
      <div class="customer-card">
        <div class="customer-top">
          <div class="customer-color" style="background:${k.primary_color||'#f0c040'}"></div>
          <div class="customer-info">
            <div class="customer-name">${k.name} <span class="badge badge-active">Aktiv</span></div>
            <div class="customer-url">${k.website_url||'-'}</div>
          </div>
          <div class="customer-actions">
            <button class="btn btn-gray" onclick="toggleEdit('${k.id}')">✏️ Redigera</button>
            <button class="btn" onclick="kopiera('${k.id}','${(k.name||"").replace(/'/g,"")}','${k.primary_color||"#f0c040"}','${(k.greeting||"Hej!").replace(/'/g,"")}','${k.logo_url||""}','${k.logo_bg||"#000"}','${k.logo_shape||"50%"}')">📋 Kopiera kod</button>
            <button class="btn btn-red" onclick="raderaKund('${k.id}')">Radera</button>
          </div>
        </div>
        <div class="edit-panel" id="edit-${k.id}">
          <h2 style="margin-top:1rem">Redigera ${k.name}</h2>
          <div class="form-grid">
            <div class="form-group"><label>Företagsnamn</label><input id="edit-name-${k.id}" value="${k.name||''}"/></div>
            <div class="form-group"><label>Hemsida URL</label><input id="edit-url-${k.id}" value="${k.website_url||''}"/></div>
            <div class="form-group"><label>Temafärg</label><input id="edit-color-${k.id}" type="color" value="${k.primary_color||'#f0c040'}"/></div>
            <div class="form-group"><label>Kontakt email</label><input id="edit-email-${k.id}" value="${k.contact_email||''}"/></div>
          </div>
          <div class="form-group" style="margin-bottom:1rem"><label>Välkomstmeddelande</label><input id="edit-greeting-${k.id}" value="${k.greeting||''}"/></div>
          <div class="form-group" style="margin-bottom:1rem"><label>Logga URL</label><input id="edit-logo-${k.id}" value="${k.logo_url||''}"/></div>
          <div class="form-grid" style="margin-bottom:1rem">
            <div class="form-group"><label>Logga bakgrundsfärg</label><input id="edit-logo-bg-${k.id}" type="color" value="${k.logo_bg||'#000000'}"/></div>
            <div class="form-group"><label>Logga form</label><select id="edit-logo-shape-${k.id}"><option value="50%" ${k.logo_shape==='50%'?'selected':''}>Rund</option><option value="8px" ${k.logo_shape==='8px'?'selected':''}>Rundad fyrkant</option><option value="0" ${k.logo_shape==='0'?'selected':''}>Fyrkantig</option></select></div>
          </div>
          <div class="form-group" style="margin-bottom:1rem"><label>Extra info till chatboten</label><textarea id="edit-info-${k.id}">${k.extra_info||''}</textarea></div>
          <button class="btn" onclick="sparaKund('${k.id}')">Spara ändringar</button>
          <div id="save-msg-${k.id}" class="success" style="display:none">✓ Sparat!</div>
        </div>
      </div>
    `).join("");
  } catch(e) {
    document.getElementById("kund-lista").innerHTML = '<div style="color:#e55;padding:2rem">Fel: ' + e.message + '</div>';
  }
}

async function laggTillKund() {
  const name = document.getElementById("f-name").value.trim();
  const url = document.getElementById("f-url").value.trim();
  const color = document.getElementById("f-color").value;
  const email = document.getElementById("f-email").value.trim();
  const greeting = document.getElementById("f-greeting").value.trim();
  const extraInfo = document.getElementById("f-info").value.trim();
  const logoUrl = document.getElementById("f-logo").value.trim();
  const logoBg = document.getElementById("f-logo-bg").value;
  const logoShape = document.getElementById("f-logo-shape").value;
  if(!name) { alert("Fyll i företagsnamn!"); return; }
  try {
    await supabaseReq("POST", "customers", {
      name, website_url:url, primary_color:color, contact_email:email,
      greeting: greeting || "Hej! Välkommen till " + name + ". Hur kan vi hjälpa dig?",
      extra_info:extraInfo, logo_url:logoUrl, logo_bg:logoBg, logo_shape:logoShape, active:true
    });
    document.getElementById("success-msg").style.display = "block";
    setTimeout(() => { document.getElementById("success-msg").style.display = "none"; document.querySelectorAll(".tab")[0].click(); }, 1500);
  } catch(e) { alert("Fel: " + e.message); }
}

async function raderaKund(id) {
  if(!confirm("Är du säker?")) return;
  await supabaseReq("DELETE", "customers?id=eq."+id);
  laddaKunder();
}

laddaKunder();
</script>
